<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Steam Invaders">
<meta name="theme-color" content="#1a0f00">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Steam Invaders</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0800;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Special Elite',serif;overflow:hidden;touch-action:none}
#gameWrap{position:relative}
canvas{display:block;border:2px solid #8B6914;box-shadow:0 0 30px rgba(180,120,20,0.4),inset 0 0 30px rgba(0,0,0,0.8)}
#ui{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:linear-gradient(180deg,rgba(20,10,0,0.9) 0%,transparent 100%);pointer-events:none}
.ui-block{display:flex;flex-direction:column;align-items:center;gap:1px}
.ui-label{font-size:9px;color:#8B6914;letter-spacing:2px;text-transform:uppercase}
.ui-val{font-size:18px;color:#D4A017;text-shadow:0 0 8px rgba(212,160,23,0.8)}
#powerupIndicator{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);font-size:12px;color:#FFD700;text-shadow:0 0 10px #FFD700;letter-spacing:1px;opacity:0;transition:opacity 0.3s}
#touchControls{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:rgba(10,5,0,0.7)}
.ctrl-btn{background:rgba(139,105,20,0.3);border:1px solid #8B6914;border-radius:6px;color:#D4A017;font-family:'Special Elite',serif;font-size:20px;padding:8px 18px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;min-width:60px;text-align:center}
.ctrl-btn:active{background:rgba(139,105,20,0.6)}
#fireBtn{font-size:14px;padding:8px 14px;min-width:80px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,5,0,0.88);z-index:10}
#overlay h1{font-size:28px;color:#D4A017;text-shadow:0 0 20px rgba(212,160,23,0.8);letter-spacing:4px;margin-bottom:8px;text-align:center}
#overlay p{color:#A08030;font-size:13px;letter-spacing:2px;margin-bottom:6px;text-align:center}
#overlay .score-display{color:#FFD700;font-size:20px;margin:10px 0}
#startBtn{margin-top:16px;background:linear-gradient(180deg,#8B6914,#5a4010);border:2px solid #D4A017;color:#FFD700;font-family:'Special Elite',serif;font-size:16px;letter-spacing:3px;padding:12px 32px;cursor:pointer;border-radius:4px;text-shadow:0 0 8px rgba(255,215,0,0.6);box-shadow:0 0 20px rgba(212,160,23,0.4)}
#startBtn:hover{background:linear-gradient(180deg,#a07820,#6a5018);box-shadow:0 0 30px rgba(212,160,23,0.6)}
.gear-deco{color:#8B6914;font-size:22px;margin:4px 0;opacity:0.7}
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="ui-block"><span class="ui-label">Score</span><span class="ui-val" id="scoreEl">0</span></div>
    <div class="ui-block"><span class="ui-label">Wave</span><span class="ui-val" id="waveEl">1</span></div>
    <div class="ui-block"><span class="ui-label">Lives</span><span class="ui-val" id="livesEl">♥♥♥</span></div>
  </div>
  <div id="powerupIndicator" id="pwrInd"></div>
  <div id="touchControls">
    <button class="ctrl-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn" id="fireBtn">FIRE</button>
    <button class="ctrl-btn" id="rightBtn">▶</button>
  </div>
  <div id="overlay">
    <div class="gear-deco">⚙ ⚙ ⚙</div>
    <h1>STEAM<br>INVADERS</h1>
    <div class="gear-deco">⚙ ⚙ ⚙</div>
    <p>— Aetheric Warfare Division —</p>
    <p style="font-size:11px;margin-top:8px;color:#6B5020">Boss ships drop power-ups<br>✦ Triple Shot  ✦ Explosive Round</p>
    <div class="score-display" id="finalScore"></div>
    <button id="startBtn">ENGAGE</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreEl');
const waveEl = document.getElementById('waveEl');
const livesEl = document.getElementById('livesEl');
const pwrInd = document.getElementById('powerupIndicator');
const finalScore = document.getElementById('finalScore');

// Sizing
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const maxH = window.innerHeight - 50;
  const ratio = 3/4;
  let w = maxW, h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = Math.floor(w);
  canvas.height = Math.floor(h);
  document.getElementById('gameWrap').style.width = canvas.width + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if (!gameRunning) drawTitle(); });

// Game state
let score=0, lives=3, wave=1, gameRunning=false, gamePaused=false;
let player, bullets=[], enemyBullets=[], enemies=[], boss=null, powerup=null;
let activePowerup=null, powerupTimer=0;
let enemyDir=1, enemySpeed=0.4, enemyDropped=false;
let frameId, lastTime=0, fireCD=0, bossTimer=0;
let keys={};

// Controls
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key===' ') { e.preventDefault(); if(gameRunning) shoot(); }
});
window.addEventListener('keyup', e => keys[e.key]=false);

document.getElementById('leftBtn').addEventListener('touchstart', e=>{e.preventDefault();keys['ArrowLeft']=true},{passive:false});
document.getElementById('leftBtn').addEventListener('touchend', e=>{e.preventDefault();keys['ArrowLeft']=false},{passive:false});
document.getElementById('rightBtn').addEventListener('touchstart', e=>{e.preventDefault();keys['ArrowRight']=true},{passive:false});
document.getElementById('rightBtn').addEventListener('touchend', e=>{e.preventDefault();keys['ArrowRight']=false},{passive:false});
document.getElementById('fireBtn').addEventListener('touchstart', e=>{e.preventDefault();if(gameRunning)shoot();},{passive:false});

startBtn.addEventListener('click', startGame);

function startGame() {
  overlay.style.display='none';
  score=0; lives=3; wave=1; gameRunning=true;
  bullets=[]; enemyBullets=[]; boss=null; powerup=null;
  activePowerup=null; powerupTimer=0;
  spawnPlayer();
  spawnWave();
  updateUI();
  if(frameId) cancelAnimationFrame(frameId);
  lastTime=0;
  frameId = requestAnimationFrame(loop);
}

function spawnPlayer() {
  const W=canvas.width, H=canvas.height;
  player = { x:W/2, y:H-55, w:36, h:22, speed:4 };
}

function spawnWave() {
  enemies=[];
  enemyDir=1;
  const cols=9, rows=4;
  const W=canvas.width;
  const startX=30, spacingX=(W-60)/cols;
  const startY=70, spacingY=36;
  for(let r=0;r<rows;r++) {
    for(let c=0;c<cols;c++) {
      enemies.push({
        x: startX + c*spacingX,
        y: startY + r*spacingY,
        w:28, h:20, type:r, alive:true,
        animFrame:0, animTimer:0
      });
    }
  }
  enemySpeed = 0.4 + (wave-1)*0.18;
  bossTimer = 400 + Math.random()*300;
}

function updateUI() {
  scoreEl.textContent = score;
  waveEl.textContent = wave;
  livesEl.textContent = '♥'.repeat(lives);
}

function shoot() {
  if(fireCD>0) return;
  fireCD=18;
  const bx=player.x+player.w/2, by=player.y;
  if(activePowerup==='triple') {
    bullets.push({x:bx,y:by,dx:-2,dy:-7,r:4,type:'triple'});
    bullets.push({x:bx,y:by,dx:0,dy:-8,r:4,type:'triple'});
    bullets.push({x:bx,y:by,dx:2,dy:-7,r:4,type:'triple'});
  } else if(activePowerup==='explosive') {
    bullets.push({x:bx,y:by,dx:0,dy:-8,r:6,type:'explosive'});
  } else {
    bullets.push({x:bx,y:by,dx:0,dy:-8,r:4,type:'normal'});
  }
}

function spawnBoss() {
  const W=canvas.width;
  const dir = Math.random()<0.5?1:-1;
  boss = {
    x: dir>0?-80:W+80, y:28,
    w:64, h:30,
    dx: dir*1.8,
    hp:3, alive:true,
    animTimer:0
  };
}

function spawnPowerup(x,y) {
  const type = Math.random()<0.5?'triple':'explosive';
  powerup = {x,y,type,vy:1.2,w:22,h:22,bob:0};
}

function showPowerupMsg(type) {
  pwrInd.textContent = type==='triple'?'✦ TRIPLE SHOT ACTIVE ✦':'✦ EXPLOSIVE ROUND ACTIVE ✦';
  pwrInd.style.opacity='1';
  setTimeout(()=>pwrInd.style.opacity='0',2000);
}

// Drawing helpers — steampunk style
function drawPlayer(x,y,w,h) {
  ctx.save();
  // Hull
  ctx.fillStyle='#7a5c1e';
  ctx.beginPath();
  ctx.moveTo(x+w/2,y);ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.closePath();
  ctx.fill();
  // Boiler
  ctx.fillStyle='#a07830';
  ctx.fillRect(x+w*0.3,y+h*0.4,w*0.4,h*0.45);
  // Gun barrel
  ctx.fillStyle='#c8982a';
  ctx.fillRect(x+w/2-3,y-8,6,12);
  // Rivets
  ctx.fillStyle='#FFD700';
  [[x+4,y+h-5],[x+w-4,y+h-5],[x+w/2,y+h*0.3]].forEach(([rx,ry])=>{
    ctx.beginPath();ctx.arc(rx,ry,2.5,0,Math.PI*2);ctx.fill();
  });
  // Exhaust pipes
  ctx.fillStyle='#6a4e18';
  ctx.fillRect(x+2,y+h*0.5,5,h*0.45);
  ctx.fillRect(x+w-7,y+h*0.5,5,h*0.45);
  // Glow under ship
  if(activePowerup) {
    const col=activePowerup==='triple'?'rgba(255,200,0,0.15)':'rgba(255,80,0,0.15)';
    ctx.fillStyle=col;
    ctx.beginPath();ctx.ellipse(x+w/2,y+h+4,w*0.6,6,0,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawEnemy(e) {
  const {x,y,w,h,type,animFrame} = e;
  ctx.save();
  const colors=['#c06020','#a05030','#804020','#603010'];
  const col=colors[type]||'#c06020';
  const af=animFrame;
  ctx.fillStyle=col;
  if(type===0) {
    // Octopus-ish
    ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2-2,h/2-2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFD700';
    for(let i=0;i<4;i++){
      const angle=(i/4)*Math.PI*2+(af?0.3:0);
      ctx.beginPath();ctx.arc(x+w/2+Math.cos(angle)*(w/2-1),y+h/2+Math.sin(angle)*(h/2-1),2.5,0,Math.PI*2);ctx.fill();
    }
    // Eyes
    ctx.fillStyle='#1a0f00';
    ctx.beginPath();ctx.arc(x+w/2-5,y+h/2-2,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+5,y+h/2-2,3,0,Math.PI*2);ctx.fill();
  } else if(type===1) {
    // Crab
    ctx.fillRect(x+4,y+4,w-8,h-8);
    ctx.fillStyle='#8B5020';
    ctx.fillRect(x,y+6,5,h-12);ctx.fillRect(x+w-5,y+6,5,h-12);
    ctx.fillStyle='#FFD700';
    if(af){ctx.fillRect(x-3,y+4,4,3);ctx.fillRect(x+w-1,y+4,4,3);}
    else{ctx.fillRect(x-3,y+8,4,3);ctx.fillRect(x+w-1,y+8,4,3);}
    ctx.fillStyle='#1a0f00';
    ctx.beginPath();ctx.arc(x+w/2-4,y+h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+4,y+h/2,2.5,0,Math.PI*2);ctx.fill();
  } else {
    // Squid/gear
    ctx.beginPath();
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2+(af?0.2:0);
      const r=i%2===0?w/2-2:w/2-6;
      if(i===0)ctx.moveTo(x+w/2+Math.cos(a)*r,y+h/2+Math.sin(a)*r);
      else ctx.lineTo(x+w/2+Math.cos(a)*r,y+h/2+Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#FFD700';
    ctx.beginPath();ctx.arc(x+w/2,y+h/2,4,0,Math.PI*2);ctx.fill();
  }
  // Gear teeth on sides
  ctx.fillStyle=col;
  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  const {x,y,w,h} = b;
  // Body - dirigible shape
  ctx.fillStyle='#5a3a10';
  ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  // Brass stripes
  ctx.strokeStyle='#D4A017';ctx.lineWidth=2;
  for(let i=1;i<4;i++){
    ctx.beginPath();
    ctx.ellipse(x+w/2,y+h/2,(w/2)*(i/4),(h/2),0,0,Math.PI*2);
    ctx.stroke();
  }
  // Gondola
  ctx.fillStyle='#7a5c1e';
  ctx.fillRect(x+w/2-12,y+h-4,24,10);
  // Propellers
  ctx.fillStyle='#D4A017';
  ctx.save();ctx.translate(x+8,y+h/2);
  ctx.rotate(b.animTimer*0.1);
  ctx.fillRect(-2,-8,4,16);ctx.fillRect(-8,-2,16,4);
  ctx.restore();
  ctx.save();ctx.translate(x+w-8,y+h/2);
  ctx.rotate(-b.animTimer*0.1);
  ctx.fillRect(-2,-8,4,16);ctx.fillRect(-8,-2,16,4);
  ctx.restore();
  // HP pips
  ctx.fillStyle='#4ade80';
  for(let i=0;i<b.hp;i++) {
    ctx.beginPath();ctx.arc(x+w/2-6+i*6,y-8,3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  if(b.type==='explosive') {
    ctx.fillStyle='#FF4400';
    ctx.shadowColor='#FF6600';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFaa00';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.5,0,Math.PI*2);ctx.fill();
  } else if(b.type==='triple') {
    ctx.fillStyle='#00DDFF';
    ctx.shadowColor='#00FFFF';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#FFD700';
    ctx.shadowColor='#FFD700';ctx.shadowBlur=6;
    ctx.fillRect(b.x-2,b.y-6,4,10);
  }
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.fillStyle='#FF3300';
  ctx.shadowColor='#FF6600';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  ctx.save();
  p.bob+=0.08;
  const bY=Math.sin(p.bob)*3;
  ctx.fillStyle=p.type==='triple'?'#00DDFF':'#FF4400';
  ctx.shadowColor=p.type==='triple'?'#00FFFF':'#FF6600';
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.arc(p.x+p.w/2,p.y+p.h/2+bY,10,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 10px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(p.type==='triple'?'3':'✦',p.x+p.w/2,p.y+p.h/2+bY);
  ctx.restore();
}

function drawBackground() {
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#0d0800';ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,220,150,0.6)';
  // Use seeded-ish approach
  for(let i=0;i<60;i++){
    const sx=((i*137+73)%W);
    const sy=((i*97+31)%H);
    ctx.fillRect(sx,sy,1,1);
  }
  // Scan lines
  ctx.fillStyle='rgba(0,0,0,0.08)';
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vg.addColorStop(0,'transparent');
  vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

function drawExplosion(x,y,t) {
  ctx.save();
  const r=t*20,a=1-t;
  ctx.globalAlpha=a;
  ctx.fillStyle='#FF8800';
  ctx.shadowColor='#FF4400';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.arc(x,y,r*0.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// Explosion pool
let explosions=[];
function addExplosion(x,y){explosions.push({x,y,t:0});}

function loop(ts) {
  if(!gameRunning){return;}
  const dt=Math.min((ts-lastTime)/16,3);
  lastTime=ts;
  update(dt);
  draw();
  frameId=requestAnimationFrame(loop);
}

function update(dt) {
  const W=canvas.width,H=canvas.height;

  // Player move
  if(keys['ArrowLeft']||keys['a']) player.x=Math.max(0,player.x-player.speed*dt);
  if(keys['ArrowRight']||keys['d']) player.x=Math.min(W-player.w,player.x+player.speed*dt);
  if(fireCD>0)fireCD-=dt;

  // Powerup timer
  if(activePowerup){powerupTimer-=dt;if(powerupTimer<=0){activePowerup=null;}}

  // Bullets
  bullets=bullets.filter(b=>{
    b.x+=b.dx*dt;b.y+=b.dy*dt;
    if(b.y<-10||b.x<-10||b.x>W+10)return false;
    // Hit enemies
    let hit=false;
    const aliveEnemies=enemies.filter(e=>e.alive);
    for(let e of aliveEnemies){
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        e.alive=false;
        addExplosion(e.x+e.w/2,e.y+e.h/2);
        score+=10*(e.type+1);
        hit=true;
        if(b.type==='explosive'){
          // Destroy neighbours
          const idx=enemies.indexOf(e);
          [-1,1].forEach(off=>{
            const n=enemies[idx+off];
            if(n&&n.alive&&Math.abs(n.y-e.y)<5){
              n.alive=false;addExplosion(n.x+n.w/2,n.y+n.h/2);score+=10*(n.type+1);
            }
          });
        }
        break;
      }
    }
    // Hit boss
    if(!hit&&boss&&boss.alive){
      if(b.x>boss.x&&b.x<boss.x+boss.w&&b.y>boss.y&&b.y<boss.y+boss.h){
        boss.hp--;addExplosion(boss.x+boss.w/2,boss.y+boss.h/2);
        hit=true;
        if(boss.hp<=0){
          boss.alive=false;score+=200;
          spawnPowerup(boss.x+boss.w/2,boss.y+boss.h);
          boss=null;
        }
      }
    }
    return !hit;
  });

  // Enemy movement
  const alive=enemies.filter(e=>e.alive);
  if(alive.length===0){wave++;spawnWave();updateUI();return;}

  let minX=Infinity,maxX=-Infinity;
  alive.forEach(e=>{minX=Math.min(minX,e.x);maxX=Math.max(maxX,e.x+e.w);});

  let drop=false;
  if(maxX>=W-10&&enemyDir>0){enemyDir=-1;drop=true;}
  if(minX<=10&&enemyDir<0){enemyDir=1;drop=true;}

  enemies.forEach(e=>{
    if(!e.alive)return;
    e.x+=enemySpeed*enemyDir*dt;
    if(drop)e.y+=16;
    e.animTimer=(e.animTimer||0)+dt;
    if(e.animTimer>20){e.animTimer=0;e.animFrame=1-e.animFrame;}
    // Enemy reaches player
    if(e.y+e.h>=player.y){loseLife();return;}
  });

  // Enemy shoot
  if(Math.random()<0.008*dt*Math.min(wave,5)){
    const shooters=alive.filter(e=>e.alive);
    if(shooters.length){
      const s=shooters[Math.floor(Math.random()*shooters.length)];
      enemyBullets.push({x:s.x+s.w/2,y:s.y+s.h,dy:3+wave*0.3});
    }
  }

  // Enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.y+=b.dy*dt;
    if(b.y>H)return false;
    // Hit player
    if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){
      loseLife();addExplosion(player.x+player.w/2,player.y+player.h/2);
      return false;
    }
    return true;
  });

  // Boss
  bossTimer-=dt;
  if(bossTimer<=0&&!boss){spawnBoss();bossTimer=500+Math.random()*400;}
  if(boss){
    boss.x+=boss.dx*dt;boss.animTimer+=dt;
    if(boss.x>W+100||boss.x<-100){boss=null;}
  }

  // Powerup
  if(powerup){
    powerup.y+=powerup.vy*dt;
    if(powerup.y>H){powerup=null;}
    else if(
      powerup.x+powerup.w>player.x&&powerup.x<player.x+player.w&&
      powerup.y+powerup.h>player.y&&powerup.y<player.y+player.h
    ){
      activePowerup=powerup.type;powerupTimer=400;
      showPowerupMsg(powerup.type);powerup=null;
    }
  }

  // Explosions
  explosions=explosions.filter(ex=>{ex.t+=0.06*dt;return ex.t<1;});
  updateUI();
}

function loseLife(){
  lives--;updateUI();
  if(lives<=0){endGame();}
  else{spawnPlayer();}
}

function endGame(){
  gameRunning=false;
  overlay.style.display='flex';
  document.querySelector('#overlay h1').textContent='GAME OVER';
  finalScore.textContent='Score: '+score;
  startBtn.textContent='TRY AGAIN';
}

function draw(){
  const W=canvas.width,H=canvas.height;
  drawBackground();
  // Ground line
  ctx.strokeStyle='#8B6914';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(0,H-48);ctx.lineTo(W,H-48);ctx.stroke();
  ctx.setLineDash([]);

  enemies.forEach(e=>{if(e.alive)drawEnemy(e);});
  if(boss)drawBoss(boss);
  bullets.forEach(b=>drawBullet(b));
  enemyBullets.forEach(b=>drawEnemyBullet(b));
  if(powerup)drawPowerup(powerup);
  drawPlayer(player.x,player.y,player.w,player.h);
  explosions.forEach(ex=>drawExplosion(ex.x,ex.y,ex.t));
}

function drawTitle(){
  const W=canvas.width,H=canvas.height;
  drawBackground();
  ctx.save();
  ctx.fillStyle='#D4A017';ctx.font='bold 32px Special Elite,serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('STEAM INVADERS',W/2,H/2);
  ctx.restore();
}
drawTitle();

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
